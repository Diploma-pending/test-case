services:
  app:
    image: stbasarab/generator:latest
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./output:/app/output
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_CLEANUP=true
    restart: unless-stopped
